<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MamaTaxi</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🚖 MamaTaxi</h1>
    <p class="subtitle">Dein privater Fahrdienst</p>

    <label>📍 Abholort</label>
    <input id="pickup" type="text" placeholder="Wo bist du?">

    <label>🏁 Ziel</label>
    <input id="destination" type="text" placeholder="Wo möchtest du hin?">

    <button id="requestRide">
        🚖 Mama rufen
    </button>

    <div class="status-box">
        <h2>Status</h2>
        <p id="status">Noch keine Anfrage gesendet.</p>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
